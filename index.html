<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL_WORD_PRO_2077</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --cp-yellow: #fcee0a;
            --cp-black: #050505;
            --cp-dark: #111111;
            --cp-blue: #00f0ff;
            --cp-red: #ff003c;
            --page-bg: #ffffff;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--cp-black);
            color: var(--cp-yellow);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: var(--cp-yellow);
            color: #000;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 900;
            clip-path: polygon(0 0, 100% 0, 100% 70%, 95% 100%, 0 100%);
            z-index: 100;
        }

        .ribbon {
            background: var(--cp-dark);
            border-bottom: 2px solid var(--cp-yellow);
            padding: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .group {
            border-right: 1px solid #333;
            padding-right: 10px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        button, select {
            background: #222;
            border: 1px solid var(--cp-yellow);
            color: var(--cp-yellow);
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.2s;
        }

        button:hover { background: var(--cp-yellow); color: #000; }
        .btn-action { background: var(--cp-blue); color: #000; border: none; }
        .btn-danger { border-color: var(--cp-red); color: var(--cp-red); }

        .workspace {
            flex: 1;
            overflow-y: auto;
            background: #0a0a0a;
            padding: 40px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            scrollbar-width: thin;
            scrollbar-color: var(--cp-yellow) #000;
        }

        /* Ajuste para que el PDF no salga cortado */
        .page {
            width: 210mm;
            min-height: 297mm;
            background: var(--page-bg);
            color: #000;
            padding: 25mm;
            box-shadow: 0 0 20px rgba(0,0,0,0.8), 0 0 5px var(--cp-yellow);
            outline: none;
            position: relative;
            cursor: text;
            word-wrap: break-word;
        }

        #status-bar {
            background: var(--cp-yellow);
            color: #000;
            padding: 5px 20px;
            font-size: 0.7rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .crt {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 1000;
        }
    </style>
</head>
<body>

<div class="crt"></div>

<header>
    <span>ARASAKA_DOC_PROCESSOR v4.0</span>
    <span id="clock">00:00:00</span>
</header>

<div class="ribbon">
    <div class="group">
        <button onclick="addPage()" class="btn-action">+ NUEVA HOJA</button>
        <button onclick="downloadDoc()" class="btn-action">💾 EXPORTAR PDF</button>
    </div>

    <div class="group">
        <select onchange="changeFont(this.value)">
            <option value="Arial">MODERNO (Arial)</option>
            <option value="Courier New">HACKER (Courier)</option>
            <option value="Times New Roman">CORPORATIVO (Times)</option>
            <option value="Impact">SUBTERRÁNEO (Impact)</option>
        </select>
        <select onchange="format('fontSize', this.value)">
            <option value="3">10px</option>
            <option value="4" selected>12px</option>
            <option value="5">16px</option>
            <option value="6">24px</option>
            <option value="7">32px</option>
        </select>
    </div>

    <div class="group">
        <button onclick="format('bold')"><b>N</b></button>
        <button onclick="format('italic')"><i>K</i></button>
        <button onclick="format('underline')"><u>S</u></button>
        <button onclick="format('foreColor', '#ff003c')">ROJO</button>
        <button onclick="format('foreColor', '#000000')">NEGRO</button>
    </div>

    <div class="group">
        <button onclick="format('justifyLeft')">⬅</button>
        <button onclick="format('justifyCenter')">⬆</button>
        <button onclick="format('justifyRight')">➡</button>
    </div>

    <button onclick="clearAll()" class="btn-danger">BORRAR TODO</button>
</div>

<div class="workspace" id="document-container">
    <div class="page" contenteditable="true" id="page-1">
        <h1 style="text-align: center;">INFORME DE MISIÓN: NIGHT CITY</h1>
        <p><b>Sujeto:</b> Angel Samurai</p>
        <hr>
        <p>Escribe aquí tus planes para hackear la red de Arasaka...</p>
    </div>
</div>

<div id="status-bar">
    <span>CONEXIÓN: CIFRADA // NEURAL_LINK: ESTABLE</span>
    <span id="pageCount">PÁGINAS: 1</span>
</div>

<script>
    let pageCount = 1;

    // Función para aplicar formatos básicos
    function format(command, value = null) {
        document.execCommand(command, false, value);
    }

    // Cambiar tipo de letra
    function changeFont(fontName) {
        document.execCommand('fontName', false, fontName);
    }

    // Añadir nueva hoja
    function addPage() {
        pageCount++;
        const container = document.getElementById('document-container');
        const newPage = document.createElement('div');
        newPage.className = 'page';
        newPage.contentEditable = 'true';
        newPage.id = `page-${pageCount}`;
        container.appendChild(newPage);
        newPage.focus();
        updateStatus();
    }

    // Descargar como PDF
    function downloadDoc() {
        const element = document.getElementById('document-container');
        const btn = document.querySelector('.btn-action[onclick="downloadDoc()"]');
        const originalText = btn.innerText;
        btn.innerText = "TRANSFIRIENDO...";

        const opt = {
            margin: 5, // Pequeño margen para que no toque los bordes del PDF
            filename: 'ANGEL_DATA_SHARD.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { 
                scale: 2, 
                useCORS: true,
                logging: false,
                backgroundColor: '#0a0a0a' // Fondo del contenedor para que coincida
            },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak: { mode: '.page' } // Fuerza el salto de página en cada div .page
        };

        html2pdf().set(opt).from(element).save().then(() => {
            btn.innerText = "PDF DESCARGADO";
            setTimeout(() => btn.innerText = originalText, 2000);
        }).catch(err => {
            console.error("Error en la descarga:", err);
            btn.innerText = "ERROR";
            setTimeout(() => btn.innerText = originalText, 2000);
        });
    }

    function clearAll() {
        if(confirm("¿Eliminar todos los datos del Shard?")) {
            const container = document.getElementById('document-container');
            container.innerHTML = '<div class="page" contenteditable="true" id="page-1"></div>';
            pageCount = 1;
            updateStatus();
        }
    }

    function updateStatus() {
        document.getElementById('pageCount').innerText = `PÁGINAS: ${pageCount}`;
    }

    // Reloj en tiempo real
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);
</script>

</body>
</html>
